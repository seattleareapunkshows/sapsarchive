function getFiles(){
    let files = [];
    if(currentYear === "all"){
        for(let y in DATA){
            files = files.concat(DATA[y]);
        }
    } else {
        files = DATA[currentYear] || [];
    }
    return files;
}

function getTotalPages(){
    return Math.ceil(getFiles().length / POSTS_PER_PAGE);
}

function updateURL(){
    const params = new URLSearchParams();
    params.set("year", currentYear);
    params.set("page", currentPage);
    history.replaceState(null, "", "?" + params.toString());
}

function render(){
    let files = getFiles();
    let totalPages = getTotalPages();

    if(currentPage > totalPages) currentPage = totalPages || 1;
    if(currentPage < 1) currentPage = 1;

    let start = (currentPage - 1) * POSTS_PER_PAGE;
    let end = start + POSTS_PER_PAGE;
    let pageFiles = files.slice(start, end);

    let gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    let grid = document.createElement("div");
    grid.className = "grid";

    pageFiles.forEach(file=>{
        let div = document.createElement("div");
        div.className = "post";

        if(file.endsWith(".mp4")){
            div.innerHTML = `<video controls src="${file}"></video>`;
        } else {
            div.innerHTML = `<img src="${file}" onclick="openLightbox('${file}')">`;
        }

        grid.appendChild(div);
    });

    gallery.appendChild(grid);

    renderPagination(totalPages);

    document.getElementById("jumpPage").max = totalPages;

    updateURL();
}

function renderPagination(totalPages){
    let container = document.getElementById("pagination");
    container.innerHTML = "";

    for(let i=1; i<=totalPages; i++){
        let link = document.createElement("a");
        link.textContent = i;

        if(i === currentPage){
            link.classList.add("active-page");
        }

        link.onclick = () => {
            currentPage = i;
            render();
        };

        container.appendChild(link);
    }
}

function changeYear(){
    currentYear = document.getElementById("yearSelect").value;
    currentPage = 1;
    render();
}

function jumpToPage(){
    let val = parseInt(document.getElementById("jumpPage").value);
    let total = getTotalPages();

    if(!val || val < 1) val = 1;
    if(val > total) val = total;

    currentPage = val;
    render();
}

function openLightbox(src){
    document.getElementById("lightbox").style.display="block";
    document.getElementById("lightbox-img").src=src;
}

function closeLightbox(){
    document.getElementById("lightbox").style.display="none";
}

// keyboard nav
document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
        closeLightbox();
    }

    if(e.key === "ArrowRight"){
        if(currentPage < getTotalPages()){
            currentPage++;
            render();
        }
    }

    if(e.key === "ArrowLeft"){
        if(currentPage > 1){
            currentPage--;
            render();
        }
    }
});

// load from URL
function loadFromURL(){
    const params = new URLSearchParams(window.location.search);

    let y = params.get("year");
    let p = parseInt(params.get("page"));

    if(y && (y === "all" || DATA[y])){
        currentYear = y;
        document.getElementById("yearSelect").value = y;
    }

    if(p && p > 0){
        currentPage = p;
    }
}

loadFromURL();
render();
